server:
  port: 8080

spring:
  application:
    name: spring-cloud-gateway

  config:
    import: sm://

  cloud:
    gateway:
      server:
        webflux:
          filter:
            json-to-grpc:
              enabled: false
          routes:
            - id: test-service-route
              uri: http://mock-server.local
              predicates:
                - Path=/test
              filters:
                - RewritePath=/test(?<segment>.*), /get${segment}
                - AddRequestHeader=X-Request-Source, Gateway
#            - id : user-service-route
#              uri: ${sm://AUTH_SERVICE_HOST}:8080
#              predicates:
#                - Path=/auth/**
#              filters:
#                - AddRequestHeader=X-Request-Source, Gateway

jwt:
  secret: ${sm://JWT_SECRET_KEY}

logging:
  level:
    org:
